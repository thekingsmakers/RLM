<!DOCTYPE html>
<html>
<head>
    <title>Redom Summary</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --accent-color: #2196f3;
            --error-color: #f44336;
        }

        [data-theme="dark"] {
            --bg-color: #1e1e1e;
            --text-color: #ffffff;
            --border-color: #404040;
            --accent-color: #64b5f6;
            --error-color: #ef5350;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .title {
            font-size: 1.2em;
            font-weight: 600;
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            padding: 5px;
            font-size: 1.2em;
        }

        .close-btn:hover {
            color: var(--accent-color);
        }

        .content {
            margin-top: 20px;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: var(--error-color);
            text-align: center;
            padding: 20px;
        }

        .summary-text {
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .mode-selector {
            margin-bottom: 20px;
        }

        select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 14px;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Loading...</h1>
            <button class="close-btn" title="Close">×</button>
        </div>
        <div class="mode-selector">
            <select id="modeSelect">
                <option value="simple">Simple Summary</option>
                <option value="detailed">Detailed Summary</option>
                <option value="bullet">Bullet Points</option>
                <option value="key-points">Key Points</option>
            </select>
        </div>
        <div class="content">
            <div class="loading">
                <div class="spinner"></div>
                <div>Generating summary...</div>
            </div>
        </div>
    </div>
    <script src="scripts/summary.js"></script>
</body>
</html>

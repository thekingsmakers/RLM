<!DOCTYPE html>
<html>
<head>
  <title>Explanation</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: #ffffff;
      color: #333333;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1a1a1a;
        color: #ffffff;
      }
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ddd;
    }

    @media (prefers-color-scheme: dark) {
      .header {
        border-bottom-color: #333;
      }
    }

    .title {
      font-size: 1.2em;
      font-weight: 600;
      margin: 0;
    }

    .close-button {
      background: none;
      border: none;
      font-size: 1.5em;
      cursor: pointer;
      color: #666;
      padding: 0;
      line-height: 1;
    }

    @media (prefers-color-scheme: dark) {
      .close-button {
        color: #999;
      }
    }

    .close-button:hover {
      color: #333;
    }

    @media (prefers-color-scheme: dark) {
      .close-button:hover {
        color: #fff;
      }
    }

    .mode-selector {
      margin-bottom: 20px;
    }

    select {
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ddd;
      background: #fff;
      color: #333;
      font-size: 14px;
    }

    @media (prefers-color-scheme: dark) {
      select {
        background: #333;
        border-color: #444;
        color: #fff;
      }
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @media (prefers-color-scheme: dark) {
      .spinner {
        border-color: #333;
        border-top-color: #3498db;
      }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .explanation {
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .error {
      color: #dc3545;
      padding: 10px;
      border: 1px solid #dc3545;
      border-radius: 4px;
      margin: 10px 0;
    }

    @media (prefers-color-scheme: dark) {
      .error {
        border-color: #dc3545;
        background: rgba(220, 53, 69, 0.1);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">Explanation</h1>
      <button class="close-button" title="Close">×</button>
    </div>
    <div class="mode-selector">
      <select id="mode">
        <option value="simple">Simple Explanation</option>
        <option value="detailed">Detailed Explanation</option>
        <option value="technical">Technical Explanation</option>
        <option value="educational">Educational Explanation</option>
      </select>
    </div>
    <div class="loading">
      <div class="spinner"></div>
      <p>Generating explanation...</p>
    </div>
    <div class="explanation"></div>
  </div>
  <script src="scripts/explanation.js"></script>
</body>
</html>
